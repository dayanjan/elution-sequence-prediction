# =============================================================================
# Elution Sequence Prediction — Master Configuration
# =============================================================================
# All hyperparameters, bin widths, seeds, and paths in one place.
# No magic numbers in code — everything references this file.
# =============================================================================

random_seed: 42

# --- Data ---
data:
  public_study_id: "ST003514"          # Metabolomics Workbench study for training
  public_url: "https://www.metabolomicsworkbench.org"
  clinical_cohorts:
    - name: "cardiac_arrest"
      samples: 87
      qc: 10
    - name: "gvhd"
      samples: 62
      qc: 6
    - name: "pcos"
      samples: 67
      qc: 8
    - name: "redhart2"
      samples: 92
      qc: 10

# --- Preprocessing ---
preprocessing:
  min_peak_height: 1000                # Minimum intensity to consider feature detected
  min_detection_rate: 0.5              # Feature must be detected in ≥50% of QC samples

# --- Tokenization ---
tokenization:
  # Primary features (ranked by RT predictive value)
  mz_bin_width: 10                     # Da
  mass_defect_bins: 20                 # Number of equal-width bins across [0, 1)
  rt_bin_width: 3                      # seconds — defines "time step" for sequence

  # Secondary features
  polarity_as_feature: true
  intensity_rank_bins: [0, 0.01, 0.05, 0.20, 0.50, 1.0]
  intensity_rank_labels: ["top1pct", "top5pct", "top20pct", "top50pct", "low"]

  # Auxiliary features
  include_lipid_class: true            # When available from annotation (~15%)
  include_kendrick: false              # Test in ablation

  # Special tokens
  special_tokens: ["[BOS]", "[EOS]", "[PAD]", "[UNK]"]

  # Sequence construction
  max_sequence_length: 512             # Max tokens per sample sequence

# --- Train/Val/Test Split ---
split:
  method: "sample_aware"               # No sequence leakage
  val_fraction: 0.15
  test_fraction: 0.15
  stratify_by: "sample_type"           # Ensure QC/analytical proportional

# --- Baselines ---
baselines:
  - "frequency"                        # Most common next token
  - "markov_order1"                    # First-order Markov chain
  - "rt_only"                          # Predict from RT context only
  - "rt_mz"                            # RT + m/z features, no sequence
  - "context_summary_gbm"             # GBM on recent context summary

# --- Neural Models ---
models:
  lstm:
    embedding_dim: 64
    hidden_dim: 128
    num_layers: 2
    dropout: 0.1
    bidirectional: false               # Causal (autoregressive) only

  transformer:
    embedding_dim: 64
    num_heads: 4
    ff_dim: 256
    num_layers: 2                      # Matches src/config.py (authoritative); 2-layer causal Transformer
    dropout: 0.1
    context_length: 64                 # Number of prior tokens to attend to

  training:
    learning_rate: 0.001
    batch_size: 32
    max_epochs: 100
    patience: 10                       # Early stopping
    scheduler: "cosine"
    weight_decay: 0.01

# --- Evaluation ---
evaluation:
  prediction_horizons_sec: [5, 15, 30] # Acquisition-utility simulation
  top_k: [1, 3, 5]                    # Top-k accuracy
  metrics:
    - "top1_accuracy"
    - "top5_accuracy"
    - "macro_f1"
    - "weighted_f1"
    - "cross_entropy"
    - "perplexity"

  # Ablation features to test removing
  ablation_features:
    - "mz_bin"
    - "mass_defect_bin"
    - "rt_gap"
    - "polarity"
    - "intensity_rank"
    - "sequence_context"               # Feed-forward baseline (no sequence)

# --- QC Warm-up Experiment ---
qc_warmup:
  n_warmup_injections: [0, 2, 4, 6, 8, 10]  # Test varying warmup lengths
  evaluate_on: "analytical"            # Performance measured on analytical samples
